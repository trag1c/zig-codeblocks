      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: pytest
        env:
          UV_PYTHON: ${{ matrix.platform.uv_arch }}
        shell: bash
        run: |
          set -euo pipefail
          uv venv
          uv pip install zig-codeblocks --no-index --no-deps --find-links dist --reinstall
          uv pip install pytest
          uv run pytest

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
